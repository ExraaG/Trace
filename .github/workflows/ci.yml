name: Trace CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: trace-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, test, and package Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Check installer syntax
        run: sh -n install.sh

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Test Rust backend
        working-directory: src-tauri
        run: cargo test --locked

      - name: Lint Rust backend
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

      - name: Build Linux release artifacts
        run: npm run tauri build -- --bundles appimage,deb

      - name: Upload Linux test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trace-linux-test-artifacts
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
