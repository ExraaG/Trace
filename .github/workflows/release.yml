name: Release Trace

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  checks: write

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libudev-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Confirm matching versions
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const packageVersion = require('./package.json').version;
          const tauriVersion = require('./src-tauri/tauri.conf.json').version;
          const cargo = fs.readFileSync('./src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          if (!cargoVersion || packageVersion !== tauriVersion || packageVersion !== cargoVersion) {
            throw new Error(`Version mismatch: package=${packageVersion}, tauri=${tauriVersion}, cargo=${cargoVersion}`);
          }
          console.log(`Trace version ${packageVersion} is consistent.`);
          NODE

      - name: Run release checks
        run: |
          sh -n install.sh
          npm audit --audit-level=high
          npm test
          npm run build
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo test --manifest-path src-tauri/Cargo.toml --locked
          cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libudev-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Windows installer script
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          [scriptblock]::Create((Get-Content -Raw install.ps1)) | Out-Null

      - name: Build and upload release bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Trace v__VERSION__
          releaseBody: |
            Trace is a focused ESP32 and Arduino desktop IDE.

            Edit an Arduino sketch, compile and upload through Arduino CLI, follow build output live, and use the built-in serial console without leaving the app.

            Linux and macOS:
            `curl -fsSL https://raw.githubusercontent.com/ExraaG/Trace/main/install.sh | sh`

            Windows PowerShell:
            `irm https://raw.githubusercontent.com/ExraaG/Trace/main/install.ps1 | iex`

            These builds are not code-signed. Windows SmartScreen or macOS Gatekeeper may ask you to confirm that you want to open Trace.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          releaseAssetNamePattern: Trace-[platform]-[arch][setup][ext]
